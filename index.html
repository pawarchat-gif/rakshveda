<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Upload Dashboard</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --bg-color: #0a0f18;
            --surface-color: rgba(10, 15, 24, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Basic Dashboard Layout */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar h2 {
            color: var(--primary-color);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Central Upload Area */
        .upload-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Radar Animation */
        .radar-container {
            position: absolute;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Lets clicks pass through to the upload box */
        }

        .radar-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 204, 0.3);
            animation: pulse 2.5s infinite ease-out;
        }

        .radar-scanner {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 204, 0.4) 100%);
            animation: spin 3s linear infinite;
        }

        /* File Upload Box (Glassmorphism) */
        .upload-box {
            z-index: 10;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px dashed var(--primary-color);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            width: 320px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .upload-box:hover, .upload-box.dragover {
            transform: scale(1.05);
            background: rgba(10, 15, 24, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            background: rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem auto;
        }

        .upload-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--primary-color);
        }

        .upload-text {
            margin-bottom: 1.5rem;
            color: #a0aec0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .upload-text span {
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }

        .file-display {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--primary-color);
            word-break: break-all;
        }

        /* Animations */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% {
                transform: scale(0.6);
                box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.4);
                opacity: 1;
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 40px rgba(0, 255, 204, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.1);
                box-shadow: 0 0 0 0 rgba(0, 255, 204, 0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
