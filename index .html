<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTOID X | PREDICTIVE CYBER DEFENSE SYSTEM | TEAM RAKSHVEDA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --security-green: #00ff88;
            --alert-red: #ff0040;
            --status-blue: #0096ff;
            --military-light: rgba(0, 255, 136, 0.2);
            --text-color: #c8d6e5;
            --bg-primary: #050510;
            --bg-secondary: #0a0a1a;
            --bg-tertiary: #0d0d25;
            --border-subtle: rgba(0, 180, 255, 0.15);
            --border-glow: rgba(0, 240, 255, 0.25);
            --neon-cyan: #00f0ff;
            --neon-purple: #b400ff;
            --neon-orange: #ff6b00;
            --neon-yellow: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-color);
            font-family: 'Share Tech Mono', 'JetBrains Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Background Grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Scan Lines */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 240, 255, 0.015) 0px,
                rgba(0, 240, 255, 0.015) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 9999;
            animation: scanLines 8s linear infinite;
        }

        @keyframes scanLines {
            0% { transform: translateY(0); }
            100% { transform: translateY(6px); }
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        .military-header {
            background: rgba(10, 15, 30, 0.95);
            border-bottom: 1px solid var(--border-glow);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5em;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .team-tag {
            font-size: 0.7em;
            color: var(--text-color);
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75em;
            letter-spacing: 2px;
            color: var(--security-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--security-green);
            box-shadow: 0 0 10px var(--security-green), 0 0 20px var(--security-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* NAVIGATION */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 5px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            color: var(--text-color);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
        }

        .nav-links li a:hover {
            color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.05);
        }

        .nav-links li a.active {
            color: var(--neon-cyan);
            border-bottom-color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.08);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .nav-links li a .nav-icon {
            font-size: 1.2em;
        }
